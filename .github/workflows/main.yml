name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
 # Tarea 1: Validar el Backend (Spring Boot)
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Backend
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew build -x test 

  # Tarea 2: Validar el Frontend (Angular)
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build -- --configuration production
          
 # Tarea de Despliegue Continuo (CD)
  deploy:
    name: Deploy to Production
    needs: [backend-build, frontend-build] # Solo si los builds anteriores tienen éxito
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Call Render Deploy Hook
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_URL }}